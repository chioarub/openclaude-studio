name: Feature request
description: Suggest a focused improvement. Write-capable features need an explicit safety and rollback model.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: read_model
    attributes:
      label: Data access
      description: Write-capable features need an explicit safety, review, backup, and rollback model.
      options:
        - Read-only
        - Requires writes
        - Not sure
    validations:
      required: true
