name: Release

on:
  push:
    tags:
      - "v*"

# Deny default token permissions. Jobs grant only the scopes they need.
permissions: {}

env:
  CI: true
  NODE_VERSION: 22

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish npm package and deploy web
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.repository == 'chioarub/openclaude-studio'
    outputs:
      version: ${{ steps.package.outputs.version }}
    # Required for checkout, npm trusted publishing, and Cloudflare deployment records.
    permissions:
      contents: read
      deployments: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Check release toolchain
        run: |
          node --version
          npm --version

      - name: Install npm with trusted publishing support
        run: |
          npm install -g "npm@^11.5.1"
          npm --version

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Read package version
        id: package
        run: |
          version="$(node -p "require('./apps/server/package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check tag matches package version
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          expected="refs/tags/v$VERSION"
          if [ "$GITHUB_REF" != "$expected" ]; then
            echo "Release tag $GITHUB_REF does not match package version $expected."
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check npm package contents
        run: npm pack --dry-run -w openclaude-studio

      - name: Smoke test packed package
        run: npm run smoke:package

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Check npm publication status
        id: npm
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          if npm view "openclaude-studio@$VERSION" version > /dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Cloudflare credentials
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Missing CLOUDFLARE_ACCOUNT_ID repository secret."; exit 1; }
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Missing CLOUDFLARE_API_TOKEN repository secret."; exit 1; }

      - name: Publish to npm
        if: steps.npm.outputs.published == 'false'
        run: npm publish -w openclaude-studio

      - name: Skip npm publish
        if: steps.npm.outputs.published == 'true'
        env:
          VERSION: ${{ steps.package.outputs.version }}
        run: echo "openclaude-studio@$VERSION is already published."

      - name: Deploy web to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=openclaude-studio --branch=main --commit-hash=${{ github.sha }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  create-github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: release
    if: github.repository == 'chioarub/openclaude-studio'
    # Required to create GitHub Releases for already-pushed release tags.
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout v6
        with:
          persist-credentials: false

      - name: Check GitHub release status
        id: github-release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          tag="v$VERSION"
          if gh release view "$tag" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build GitHub release notes
        if: steps.github-release.outputs.exists == 'false'
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          version="$VERSION"
          awk -v version="$version" '
            $0 == "## " version { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes-changelog.md

          if [ ! -s release-notes-changelog.md ]; then
            echo "No CHANGELOG.md section found for $version."
            exit 1
          fi

          {
            echo "## Highlights"
            cat release-notes-changelog.md
            echo
            echo "## Release Artifacts"
            echo
            echo "- npm package: https://www.npmjs.com/package/openclaude-studio/v/$version"
            echo "- Release workflow: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo
            echo "## Validation"
            echo
            echo "The release workflow completed successfully, including lint, unit tests, build, package dry-run, packed-package smoke test, end-to-end tests, npm publish, and Cloudflare Pages deploy."
          } > release-notes.md

      - name: Create GitHub release
        if: steps.github-release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          version="$VERSION"
          gh release create "v$version" \
            --title "OpenClaude Studio v$version" \
            --verify-tag \
            --notes-file release-notes.md

      - name: Skip GitHub release creation
        if: steps.github-release.outputs.exists == 'true'
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: echo "GitHub release v$VERSION already exists."
