name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  deployments: write
  id-token: write

env:
  CI: true
  NODE_VERSION: 22

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish npm package and deploy web
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.repository == 'chioarub/openclaude-studio'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Check release toolchain
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Read package version
        id: package
        run: |
          version="$(node -p "require('./apps/server/package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check tag matches package version
        run: |
          expected="refs/tags/v${{ steps.package.outputs.version }}"
          if [ "$GITHUB_REF" != "$expected" ]; then
            echo "Release tag $GITHUB_REF does not match package version $expected."
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Check npm package contents
        run: npm pack --dry-run -w openclaude-studio

      - name: Smoke test packed package
        run: npm run smoke:package

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Check npm publication status
        id: npm
        run: |
          if npm view "openclaude-studio@${{ steps.package.outputs.version }}" version > /dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Cloudflare credentials
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Missing CLOUDFLARE_ACCOUNT_ID repository secret."; exit 1; }
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Missing CLOUDFLARE_API_TOKEN repository secret."; exit 1; }

      - name: Publish to npm
        if: steps.npm.outputs.published == 'false'
        run: npm publish -w openclaude-studio

      - name: Skip npm publish
        if: steps.npm.outputs.published == 'true'
        run: echo "openclaude-studio@${{ steps.package.outputs.version }} is already published."

      - name: Deploy web to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=openclaude-studio --branch=main --commit-hash=${{ github.sha }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
